  <!-- Folder body -->
  <path d="M4 10 L4 38 C4 40.2 5.8 42 8 42 L40 42 C42.2 42 44 40.2 44 38 L44 14 C44 11.8 42.2 10 40 10 L24 10 L20 6 L8 6 C5.8 6 4 7.8 4 10 Z" 
