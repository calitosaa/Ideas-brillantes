# Maia OS GTK Theme - Material 3 Expressive
# Tema completo para GTK3 y GTK4

[options]
gtk-theme-name=Maia-M3E
gtk-icon-theme-name=Material-Icons
gtk-font-name=Roboto Flex 11
gtk-cursor-theme-name=Maia-Cursor
gtk-cursor-theme-size=24
gtk-toolbar-style=GTK_TOOLBAR_ICONS
gtk-toolbar-icon-size=GTK_ICON_SIZE_LARGE_TOOLBAR
gtk-button-images=0
gtk-menu-images=0
gtk-enable-event-sounds=1
gtk-enable-input-feedback-sounds=0
gtk-xft-antialias=1
gtk-xft-hinting=1
gtk-xft-hintstyle=hintslight
gtk-xft-rgba=rgb
gtk-application-prefer-dark-theme=1

# Colores Material 3 Expressive
[colors]
primary=#6750A4
on-primary=#FFFFFF
primary-container=#E8DEF8
on-primary-container=#1D192B
secondary=#625B71
on-secondary=#FFFFFF
secondary-container=#E8DEF8
on-secondary-container=#1D192B
tertiary=#7D5260
on-tertiary=#FFFFFF
tertiary-container=#FFD8E4
on-tertiary-container=#31111D
background=#141218
on-background=#E6E1E5
surface=#141218
on-surface=#E6E1E5
surface-variant=#49454F
on-surface-variant=#CAC4D0
outline=#938F99
shadow=#000000
inverse-surface=#E6E1E5
inverse-on-surface=#1C1B1F
inverse-primary=#6750A4

# Bordes redondeados (en px)
[border-radius]
small=8
medium=12
large=16
x-large=24
xx-large=28

# Animaciones
[animations]
duration-short=150ms
duration-medium=250ms
duration-long=350ms
easing-standard=cubic-bezier(0.2, 0.0, 0, 1.0)
easing-emphasized=cubic-bezier(0.2, 0.0, 0, 1.0)
easing-decelerated=cubic-bezier(0.0, 0.0, 0.2, 1)
easing-accelerated=cubic-bezier(0.4, 0.0, 1, 1)
