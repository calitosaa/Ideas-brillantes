<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo circular con gradiente Material 3 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6750A4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9A82DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8DEF8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="starGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Círculo de fondo -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Círculo interior decorativo -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFFFFF" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="180" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
  
  <!-- Estrella de Maia (estrella de 8 puntas estilizada) -->
  <g filter="url(#glow)">
    <!-- Puntos cardinales -->
    <path d="M256 100 L268 200 L368 212 L268 224 L256 324 L244 224 L144 212 L244 200 Z" 
          fill="url(#starGradient)" opacity="0.9"/>
    
    <!-- Puntos diagonales -->
    <path d="M180 180 L236 220 L220 280 L256 256 L292 280 L276 220 L332 180 L272 236 L332 292 L272 256 L292 332 L256 292 L220 332 L240 256 L180 292 L200 236 L140 256 L200 220 L140 212 L200 200 L180 140 L220 200 L256 180 L292 200 L332 140 L312 200 L372 212 L312 220 L332 292 L292 236 L372 256 L312 276 L372 292 L312 308 L332 372 L292 312 L256 332 L220 312 L180 372 L200 308 L140 292 L200 276 L140 256 L200 236 L140 220 L200 212 L180 140 Z" 
          fill="#FFFFFF" opacity="0.6"/>
  </g>
  
  <!-- Texto "Maia" estilizado -->
  <text x="256" y="420" 
        font-family="Roboto, Arial, sans-serif" 
        font-size="48" 
        font-weight="700"
        fill="#FFFFFF" 
        text-anchor="middle"
        letter-spacing="2">Maia</text>
  
  <!-- Partículas decorativas (estrellas pequeñas) -->
  <circle cx="150" cy="150" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="380" cy="140" r="3" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="120" cy="280" r="3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="400" cy="300" r="4" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="200" cy="380" r="2" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="320" cy="360" r="3" fill="#FFFFFF" opacity="0.7"/>
  
  <!-- Anillo exterior decorativo -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.2"/>
</svg>
